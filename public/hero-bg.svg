    <rect x="610" y="870" width="95" height="80" rx="3"/>
    <rect x="745" y="825" width="60" height="120" rx="3"/>
    <rect x="840" y="780" width="80" height="165" rx="3"/>
    <rect x="955" y="860" width="100" height="85" rx="3"/>
    <rect x="1090" y="810" width="60" height="135" rx="3"/>
    <rect x="1185" y="845" width="90" height="100" rx="3"/>
    <rect x="1310" y="775" width="70" height="170" rx="3"/>
    <rect x="1415" y="850" width="105" height="95" rx="3"/>
