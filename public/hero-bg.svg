    <rect x="288" y="812" width="6" height="8" rx="1"/>
    <rect x="302" y="850" width="6" height="8" rx="1"/>
    <rect x="530" y="828" width="6" height="8" rx="1"/>
    <rect x="548" y="862" width="6" height="8" rx="1"/>
    <rect x="762" y="848" width="6" height="8" rx="1"/>
    <rect x="858" y="805" width="7" height="9" rx="1"/>
    <rect x="884" y="838" width="7" height="9" rx="1"/>
    <rect x="1104" y="835" width="6" height="8" rx="1"/>
    <rect x="1328" y="800" width="6" height="8" rx="1"/>
